<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Virtual Moments Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d4a94; color: white; overflow-x: hidden; }
        .nav-link { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; }
        .nav-link:hover { transform: scale(1.2) translateY(-2px); color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .social-float { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 12px; }
        .social-icon-btn { transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .social-icon-btn:hover, .social-icon-btn:active { transform: scale(1.3) translate3d(-5px, -5px, 0); box-shadow: 0 15px 30px rgba(0,0,0,0.3); filter: brightness(1.2); }

        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.8s ease; position: relative; min-height: 320px; }
        .service-icon { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .service-card:hover .service-icon, .service-card.is-tapped .service-icon { transform: translateY(-15px) scale(1.1); color: #7dd3fc; filter: drop-shadow(0 0 15px rgba(125, 211, 252, 0.6)); }
        .service-front { transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; }
        .service-back { position: absolute; inset: 0; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; opacity: 0; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(13, 74, 148, 0.5); pointer-events: none; }
        .service-card:hover .service-front, .service-card.is-tapped .service-front { opacity: 0; filter: blur(8px); }
        .service-card:hover .service-back, .service-card.is-tapped .service-back { opacity: 1; pointer-events: auto; }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="social-float">
        <a href="https://wa.me/message/63AN23BO226RG1" target="_blank" class="social-icon-btn bg-green-500 w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp text-xl md:text-2xl"></i></a>
        <a href="https://www.facebook.com/VirtualMomentsAgencyCareers" target="_blank" class="social-icon-btn bg-blue-600 w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-facebook text-xl md:text-2xl"></i></a>
        <a href="https://www.linkedin.com/company/virtual-moments-agency/" target="_blank" class="social-icon-btn bg-blue-800 w-11 h-11 md:w-12 md:h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-linkedin text-xl md:text-2xl"></i></a>
    </div>
    </body>
</html>
