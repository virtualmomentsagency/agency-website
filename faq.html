<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Virtual Moments Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d4a94; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); min-height: 180px; display: flex; align-items: center; justify-content: center; padding: 2rem; cursor: pointer; position: relative; }
        .faq-question { transition: all 0.8s ease; opacity: 1; text-align: center; font-weight: 700; }
        .faq-answer { position: absolute; inset: 0; padding: 1.5rem; display: flex; align-items: center; justify-content: center; text-align: center; opacity: 0; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(13, 74, 148, 0.95); font-size: 0.9rem; line-height: 1.6; }
        .glass-card:hover .faq-question, .glass-card.is-tapped .faq-question { opacity: 0; transform: scale(0.95); }
        .glass-card:hover .faq-answer, .glass-card.is-tapped .faq-answer { opacity: 1; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-[#0d4a94]/95 backdrop-blur-md p-4 md:p-6 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo.png" alt="VMA Logo" class="h-8 md:h-12 w-auto"></a>
            <div class="space-x-8 hidden lg:flex text-slate-200 font-medium text-xs uppercase tracking-widest text-white">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="services.html" class="hover:text-white transition">Services</a>
                <a href="about.html" class="hover:text-white transition">About Us</a>
                <a href="faq.html" class="border-b-2 border-white pb-1">FAQ</a>
                <a href="contact.html" class="hover:text-white transition">Contact</a>
            </div>
            <button onclick="toggleMenu()" class="lg:hidden text-white text-2xl"><i class="fas fa-bars"></i></button>
        </div>
    </nav>
    <main class="py-20 px-6 max-w-6xl mx-auto">
        <h2 class="text-4xl text-center font-extrabold mb-16 uppercase italic reveal active">FAQ</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-20">
            <div class="glass-card rounded-2xl reveal active" onclick="this.classList.toggle('is-tapped')"><div class="faq-question">Experience required for partners?</div><div class="faq-answer">Experience is a plus, but we prioritize attitude and work ethics.</div></div>
            <div class="glass-card rounded-2xl reveal active" onclick="this.classList.toggle('is-tapped')"><div class="faq-question">Do you have training?</div><div class="faq-answer">Subject to the role, but we provide 100% operational support.</div></div>
            </div>
    </main>
    <script>function toggleMenu() { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
    function reveal() { var r = document.querySelectorAll(".reveal"); for (var i = 0; i < r.length; i++) { var h = window.innerHeight; var t = r[i].getBoundingClientRect().top; if (t < h - 80) { r[i].classList.add("active"); } } }
    window.addEventListener("scroll", reveal); window.addEventListener("load", reveal);</script>
</body>
</html>
