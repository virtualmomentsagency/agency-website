    <style>
        body { background-color: #0d4a94; color: white; overflow-x: hidden; scroll-behavior: smooth; }

        .contact-card:hover { transform: scale(1.1) translateY(-15px); background: white; color: #0d4a94; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }

    </style>
</head>
<body>

    <script>
        function toggleMenu() { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function reveal() { var r = document.querySelectorAll(".reveal"); for (var i = 0; i < r.length; i++) { var h = window.innerHeight; var t = r[i].getBoundingClientRect().top; if (t < h - 80) { r[i].classList.add("active"); } } }
        window.addEventListener("scroll", reveal); window.addEventListener("load", reveal);
    </script>
